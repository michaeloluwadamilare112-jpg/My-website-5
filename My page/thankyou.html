<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thank You | Black Dragon Graphics Design</title><link rel="stylesheet" href="style.css"><link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><style>

body{
background:#050505;
color:#fff;
font-family:'Poppins',sans-serif;
margin:0;
padding:0;
}

.thankyou-section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.thankyou-card{

max-width:700px;
width:100%;

background:#111;

border:1px solid #00ff88;

border-radius:25px;

padding:60px 40px;

text-align:center;

box-shadow:
0 0 20px rgba(0,255,136,.15),
0 0 60px rgba(0,255,136,.05);

}

.success-icon{

width:120px;
height:120px;

margin:auto auto 30px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:4rem;

color:#00ff88;

border:3px solid #00ff88;

box-shadow:
0 0 20px rgba(0,255,136,.4);

}

.thankyou-card h1{

font-size:3rem;

margin-bottom:20px;

color:#00ff88;

}

.thankyou-card p{

font-size:1.1rem;

line-height:1.8;

color:#ccc;

margin-bottom:20px;

}

.response-time{

color:#00ff88;
font-weight:600;
margin-bottom:35px;

}

.buttons{

display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;

}

.btn{

display:inline-block;

padding:15px 35px;

background:#00ff88;

color:#000;

font-weight:700;

border-radius:50px;

text-decoration:none;

transition:.3s;

}

.btn:hover{

transform:translateY(-5px);

}

.btn-outline{

display:inline-block;

padding:15px 35px;

border:2px solid #00ff88;

color:#fff;

border-radius:50px;

text-decoration:none;

transition:.3s;

}

.btn-outline:hover{

background:#00ff88;

color:#000;

}

@media(max-width:768px){

.thankyou-card{
padding:40px 25px;
}

.thankyou-card h1{
font-size:2.2rem;
}

.success-icon{
width:90px;
height:90px;
font-size:3rem;
}

}

</style></head><body><section class="thankyou-section"><div class="thankyou-card"><div class="success-icon"><i class="fas fa-check"></i>

</div><h1>You're All Set</h1><p>Your message has been submitted successfully.

Thank you for contacting Black Dragon Graphics Design.

</p><p class="response-time">Response time: Usually within 24 hours.

</p><div class="buttons"><a href="index.html" class="btn">Return Home

</a><a href="portfolio.html"
class="btn-outline">

Explore Our Work

</a></div></div></section></body></html>
